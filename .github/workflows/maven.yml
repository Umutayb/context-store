name: ⚙️ Java CI with Maven

on:
  pull_request:
    branches:
      - main

jobs:
  regression-tests:
    name: ✅ Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Build & Test
        run: mvn clean test