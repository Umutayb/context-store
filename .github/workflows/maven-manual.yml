name: 🧪 Manual Test Run With Maven

on: workflow_dispatch

jobs:
  manual-regression:
    name: 🧪 Manual Regression
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🛠️ Build & Test
        run: mvn clean test